schema_version: 1

context:
  name: alibabacloud-credentials
  version: "1.0.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: ae66c4374914862959cbf096839e40cadf8f44c6f18ea44a5a3f1e71da63c428

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - alibabacloud-tea >=0.4.0
    - aiofiles >=22.1.0,<25.0.0
    - alibabacloud_credentials_api >=1.0.0,<2.0.0
    - apscheduler >=3.10.0,<4.0.0

tests:
  - python:
      imports:
        - alibabacloud_credentials
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The alibabacloud credentials module of alibabaCloud Python SDK.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/aliyun/credentials-python

extra:
  recipe-maintainers:
    - xylar
